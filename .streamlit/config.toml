[theme]
base            = "dark"
primaryColor    = "#4fc3f7"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1f35"
textColor       = "#e0f0ff"
font            = "sans serif"

[server]
headless      = true
port          = 8501
enableCORS    = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
