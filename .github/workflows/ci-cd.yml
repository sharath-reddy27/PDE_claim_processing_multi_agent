# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — PDE Claim Processing System
# ──────────────────────────────────────────────────────────────────────────────
# Triggers on every push to main branch.
#
# Pipeline stages:
#   1. lint      — check Python syntax on all source files
#   2. test      — run unit tests (syntax + import checks, no LLM calls)
#   3. deploy    — notify Streamlit Cloud to redeploy (auto via GitHub connect)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD — PDE Claim Processing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint — Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes

      - name: Run syntax check on all Python files
        run: |
          echo "Checking Python syntax..."
          python -m pyflakes agents/orchestrator.py
          python -m pyflakes agents/rx_claim_agent.py
          python -m pyflakes agents/report_builder_agent.py
          python -m pyflakes agents/servicenow_agent.py
          python -m pyflakes agents/email_agent.py
          python -m pyflakes tools/db_tools.py
          python -m pyflakes tools/sop_tools.py
          python -m pyflakes tools/llm_tools.py
          python -m pyflakes graph.py
          python -m pyflakes app.py
          echo "✅ All syntax checks passed"

  # ── Stage 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test — Import & Structure Checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set dummy env vars (no real LLM calls in CI)
        run: |
          echo "AZURE_OPENAI_API_KEY=dummy"        >> $GITHUB_ENV
          echo "AZURE_OPENAI_API_VERSION=2024-02-01" >> $GITHUB_ENV
          echo "AZURE_OPENAI_ENDPOINT=https://dummy.openai.azure.com/" >> $GITHUB_ENV
          echo "AZURE_OPENAI_DEPLOYMENT=gpt-4o"    >> $GITHUB_ENV

      - name: Check all key modules import correctly
        run: |
          python -c "from tools.db_tools import get_claim; print('✅ db_tools OK')"
          python -c "from tools.sop_tools import load_sop; print('✅ sop_tools OK')"
          python -c "from graph import build_graph; print('✅ graph OK')"
          echo "✅ All import checks passed"

      - name: Verify database files exist
        run: |
          test -f db/rx_claims.db  && echo "✅ rx_claims.db found"  || echo "⚠️  rx_claims.db missing"
          test -f db/reports.db    && echo "✅ reports.db found"    || echo "⚠️  reports.db missing"

      - name: Verify SOP files exist
        run: |
          test -f sop/SOP_PDE_781.txt && echo "✅ SOP 781 found" || exit 1
          test -f sop/SOP_PDE_935.txt && echo "✅ SOP 935 found" || exit 1

  # ── Stage 3: Deploy notification ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy — Streamlit Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment confirmation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅  CI passed — Streamlit Cloud will auto-deploy"
          echo "   Repo  : ${{ github.repository }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   By    : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🔗 Your app: https://share.streamlit.io"
          echo ""
          echo "Streamlit Cloud automatically redeploys when a new"
          echo "commit lands on the main branch — no extra step needed."
